            <div><div style={{fontSize:11,color:"#C9A84C",fontWeight:700,letterSpacing:2,marginBottom:4}}>MAGIC NUMBER</div><div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16}}><div style={{fontSize:48,fontWeight:900,color:"#C9A84C",fontFamily:"'Playfair Display',serif"}}>{magic.magic}</div><div style={{textAlign:"left"}}><div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{magic.name}'s magic number</div><div style={{fontSize:11,color:"#ffffff80",marginTop:2}}>Wins needed to clinch over {magic.second}</div></div></div></div>}

                  <div style={{textAlign:"right"}}><div style={{fontSize:10,color:GYv}}>Projected</div><div style={{fontSize:18,fontWeight:900,color:Nv,fontFamily:"'Playfair Display',serif"}}>{p.proj}</div></div>

            <div className="wst-grid" style={{padding:"16px 24px",display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(220px, 1fr))",gap:12}}>

          {recap&&recap.leaderW>0&&<div style={{marginTop:24,background:cB,borderRadius:12,overflow:"hidden",border:"1px solid "+cBd}}>

            <div style={{padding:"16px 24px"}}>
              {/* Leader & Gap */}
              <div className="recap-row" style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:16}}>
                <div style={{flex:1,minWidth:160,padding:"12px 16px",background:LGv,borderRadius:8,border:"1px solid "+Gv+"40"}}>

              <tbody>{(function(){var aT=[].concat(m.teams||[]);var ms=mspM[m.name];if(ms&&!aT.includes(ms))aT.push(ms);return aT.sort(function(a,b){return(rc[b]?rc[b].w:0)-(rc[a]?rc[a].w:0)}).map(function(t,ti){var r=rc[t]||{w:0,l:0};var iM=ms===t;var gp=r.w+r.l;var pace=gp>10?Math.round(r.w*(162/gp)):0;var tc=TEAM_COLORS[t]||"transparent";return <tr key={t} style={{background:ti%2===0?rA:cB,borderLeft:"3px solid "+tc}}><td style={{padding:"10px 14px",fontSize:13,color:Nv}}>{tL(t,18)}{iM?<span style={{fontSize:8,color:Gv,fontWeight:700,marginLeft:6}}>MID-SEASON</span>:""}</td><td style={{textAlign:"center"}}><span style={{fontSize:17,fontWeight:800,color:GRv}}>{r.w}</span>{pace>0&&<div style={{fontSize:9,color:GYv,marginTop:1}}>{pace} pace</div>}</td></tr>})})()}</tbody>

          </div>})}
        </div>}

        {/* ===== DRAFT ===== */}
        {tab==="draft"&&<div>
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
            {!adm?<button onClick={function(){setAdm(true)}} style={{background:cB,border:"1px solid "+cBd,borderRadius:6,padding:"8px 14px",fontSize:11,color:GYv,fontFamily:"'Libre Franklin',sans-serif"}}>Admin</button>:

              {!isAdm?<input type="password" placeholder="Password" value={pwd} onChange={function(e){setPwd(e.target.value)}} style={{padding:"6px 10px",border:"1px solid "+iBd,borderRadius:6,fontSize:12,width:120,fontFamily:"'Libre Franklin',sans-serif",background:iB,color:Nv}}/>:
              <div style={{display:"flex",gap:6}}><button onClick={undo} style={{background:RDv,color:"#fff",border:"none",borderRadius:6,padding:"8px 16px",fontSize:12,fontWeight:700,fontFamily:"'Libre Franklin',sans-serif"}}>UNDO PICK</button><button onClick={saveWeek} style={{background:"#1B2A4A",color:"#fff",border:"none",borderRadius:6,padding:"8px 16px",fontSize:12,fontWeight:700,fontFamily:"'Libre Franklin',sans-serif"}}>SAVE WEEK</button></div>}
              <button onClick={function(){setAdm(false);setPwd("")}} style={{background:"transparent",border:"none",fontSize:14,color:GYv}}>x</button>
            </div>}
          </div>

            <div style={{flex:1,minWidth:0}}>

          :dlk?<div>
            {/* Locked draft results */}
            <div ref={draftResultsRef} style={{background:cB,borderRadius:10,overflow:"hidden",border:"1px solid "+cBd}}>

                    return <tr key={t} style={{background:i%2===0?rA:cB}}><td style={{padding:"8px 12px",fontWeight:600,fontSize:12,color:Nv}}>{tL(t,16)}</td>
                      <td style={{textAlign:"center",padding:"8px 6px"}}>{editRec?<input type="number" value={r.w} onChange={function(e){setRc(t,"w",e.target.value)}} style={{width:48,textAlign:"center",border:"2px solid "+GRv,borderRadius:4,padding:3,fontSize:13,fontWeight:800,color:GRv,background:iB}}/>:<span style={{fontWeight:800,color:GRv,fontSize:14}}>{r.w}</span>}</td>
                      <td style={{textAlign:"center",padding:"8px 6px"}}>{editRec?<input type="number" value={r.l} onChange={function(e){setRc(t,"l",e.target.value)}} style={{width:44,textAlign:"center",border:"1px solid "+iBd,borderRadius:4,padding:3,fontSize:10,color:GYv,background:iB}}/>:<span style={{color:GYv,fontSize:10}}>{r.l}</span>}</td>
                      <td style={{padding:"8px 12px",fontSize:11,color:ow==="-"?GYv:Gv,fontWeight:600}}>{ow}</td></tr>})}</tbody></table></div>})}
          </div>
        </div>}

        {/* ===== RULES ===== */}
        {tab==="rules"&&<div>
          <div style={{background:cB,borderRadius:12,overflow:"hidden",border:"1px solid "+cBd,marginBottom:24}}><div style={{background:"#1B2A4A",padding:"14px 24px"}}><span style={{color:"#fff",fontSize:14,fontWeight:700}}>FANTASY MLB TEAM LEAGUE - OFFICIAL RULES</span></div>
            <div style={{padding:"24px"}}><div style={{fontSize:18,fontWeight:900,color:Nv,fontFamily:"'Playfair Display',serif",marginBottom:16}}>WINS ARE ALL THAT MATTER</div>
              {[{t:"THE GAME",i:["Fantasy MLB Team League is a season-long fantasy game where 4 managers draft MLB teams and compete based on total regular season wins.","The manager whose 7 teams accumulate the most combined wins by the end of the MLB regular season is crowned champion."]},{t:"THE DRAFT",i:["Snake draft format - 6 rounds on Draft Day, 4 managers.","24 of 30 MLB teams are drafted in the main draft.","Draft order is determined by a one-time randomizer on draft night.","Round 1 follows the randomized order (1-2-3-4). Round 2 reverses (4-3-2-1). This alternates through all 6 rounds.","Once a team is drafted, the pick is final and locked.","Draft Day 2026: March 18, 2026.","MID-SEASON DRAFT: A 7th round (1 pick per manager) takes place on July 4, 2026. Each manager picks from the remaining 6 teams. Those teams are added to rosters mid-season. 2 teams will remain undrafted."]},{t:"SCORING",i:["Only regular season WINS count. Losses, PCT, and postseason results do not affect standings.","Each manager's team wins are totaled throughout the season (6 teams pre-July 4, 7 teams after mid-season draft).","Standings update automatically via the MLB Stats API."]},{t:"TIEBREAKER",i:["In the event of a tie in total wins, the manager whose single best team has the most wins is declared the winner."]},{t:"ENTRY & PRIZES",i:["Entry fee: $75 per manager ($50 regular season + $25 World Series pick).","Total prize pool: $225.","Regular Season Champion: $150","World Series Pick Winner: $75","Best Single Team: Bragging Rights"]},{t:"WORLD SERIES PICK",i:["The manager who rosters the team that wins the 2026 World Series wins this portion of the game.","This is a separate $25 entry with a $75 payout.","If the World Series winner is not on any manager's roster, entries are returned and all contestants are forever banned from future participation."]},{t:"2025 CHAMPION",i:["Ben - 600 total wins","Runner-up: Rip - 581 wins","Margin of victory: 19 wins"]}].map(function(s){return <div key={s.t} style={{marginBottom:20}}><div style={{fontSize:12,fontWeight:800,color:Gv,letterSpacing:2,marginBottom:8,textTransform:"uppercase"}}>{s.t}</div>{s.i.map(function(it,i){return <div key={i} style={{fontSize:13,color:GYv,lineHeight:1.8,paddingLeft:12,marginBottom:4}}><span style={{color:Nv,marginRight:6}}>{">"}</span>{it}</div>})}</div>})}</div></div>
          <div style={{background:"#1B2A4A",borderRadius:12,padding:"32px 24px",textAlign:"center"}}><div style={{fontSize:11,color:"#C9A84C",fontWeight:700,letterSpacing:3,marginBottom:8}}>SUPPORT THE LEAGUE</div><div style={{fontSize:20,fontWeight:900,color:"#fff",fontFamily:"'Playfair Display',serif",marginBottom:8}}>Help Keep This Growing</div><div style={{fontSize:12,color:"#ffffff80",marginBottom:20}}>Fantasy MLB Team League is built with love. Support the commissioner and help keep it running. Suggested donation: $1</div><a href="https://venmo.com/michaelrippe?txn=pay&amount=1&note=Fantasy%20MLB%20Team%20League%20Support" target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:8,background:"#008CFF",color:"#fff",textDecoration:"none",padding:"12px 32px",borderRadius:24,fontSize:14,fontWeight:700}}><svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M19.5 3.5c.8 1.1 1.2 2.3 1.2 3.8 0 4.7-4 10.8-7.2 15.1H6.8L4 3.8l5.4-.5 1.6 12.8c1.5-2.4 3.3-6.2 3.3-8.8 0-1.3-.2-2.2-.6-3l5.8-.8z"/></svg>Support via Venmo - $1</a><div style={{fontSize:10,color:"#ffffff40",marginTop:12}}>@michaelrippe</div></div>
        </div>}

        {/* ===== FUTURE LEAGUES ===== */}
        {tab==="future"&&<div>
          {/* Hero */}
          <div style={{background:"#1B2A4A",borderRadius:12,padding:"40px 24px",textAlign:"center",marginBottom:24}}>
            <div style={{fontSize:11,color:"#C9A84C",fontWeight:700,letterSpacing:4,marginBottom:8}}>COMING SOON</div>
            <div style={{fontSize:28,fontWeight:900,color:"#fff",fontFamily:"'Playfair Display',serif",marginBottom:8}}>Fantasy Team League is Expanding</div>
            <div style={{fontSize:14,color:"#ffffff80",maxWidth:500,margin:"0 auto"}}>The same draft-and-compete format you love — coming to more sports. Sign up for early access and league invites.</div>
          </div>

          {/* League Cards */}
          <div className="future-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(150px, 1fr))",gap:16,marginBottom:24}}>
            {[
              {name:"MLB",logo:"https://a.espncdn.com/combiner/i?img=/i/teamlogos/leagues/500/mlb.png&w=100",status:"ACTIVE",color:GRv,teams:30,perMgr:"6-7",active:true},
              {name:"NFL",logo:"https://a.espncdn.com/combiner/i?img=/i/teamlogos/leagues/500/nfl.png&w=100",status:"FALL 2026",color:Gv,teams:32,perMgr:"8"},
              {name:"NBA",logo:"https://a.espncdn.com/combiner/i?img=/i/teamlogos/leagues/500/nba.png&w=100",status:"FALL 2026",color:Gv,teams:30,perMgr:"7-8"},
              {name:"World Cup",logo:"https://upload.wikimedia.org/wikipedia/en/thumb/e/e3/2026_FIFA_World_Cup.svg/200px-2026_FIFA_World_Cup.svg.png",status:"SUMMER 2026",color:Gv,teams:48,perMgr:"12"},
              {name:"NHL",logo:"https://a.espncdn.com/combiner/i?img=/i/teamlogos/leagues/500/nhl.png&w=100",status:"2027",color:GYv,teams:32,perMgr:"8"}
            ].map(function(lg){
              var sel=signLeagues.includes(lg.name);
              return <div key={lg.name} onClick={function(){if(!lg.active)toggleLeague(lg.name)}} style={{
                background:cB,borderRadius:12,padding:"20px 16px",textAlign:"center",
                border:sel?"2px solid "+Gv:"1px solid "+cBd,cursor:lg.active?"default":"pointer",
                transition:"all 0.15s",opacity:lg.active?0.7:1
              }}>
                <img src={lg.logo} alt={lg.name} style={{width:50,height:50,objectFit:"contain",marginBottom:8}} onError={function(e){e.target.style.display="none"}}/>
                <div style={{fontSize:14,fontWeight:800,color:Nv}}>{lg.name}</div>
                <div style={{fontSize:10,fontWeight:700,color:lg.color,letterSpacing:1,marginTop:4}}>{lg.status}</div>
                <div style={{fontSize:9,color:GYv,marginTop:4}}>{lg.teams} teams · {lg.perMgr} per manager</div>
                {!lg.active&&<div style={{fontSize:9,color:sel?GRv:GYv,marginTop:4,fontWeight:sel?700:400}}>{sel?"SELECTED":"Click to select"}</div>}
              </div>
            })}
          </div>

          {/* How It Works */}
          <div style={{background:cB,borderRadius:12,overflow:"hidden",border:"1px solid "+cBd,marginBottom:24}}>
            <div style={{background:"#1B2A4A",padding:"14px 24px"}}><span style={{color:"#fff",fontSize:14,fontWeight:700}}>HOW IT WORKS</span></div>
            <div style={{padding:"24px",display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:24}}>
              {[
                {step:"1",icon:"\ud83c\udfb2",title:"Draft Teams",desc:"Snake draft format. Each manager drafts real teams. No players, no lineups — just pick the teams you believe in."},
                {step:"2",icon:"\ud83d\udcca",title:"Track Wins",desc:"Standings auto-update all season. Your teams' real-world wins are your score. Most combined wins at the end takes the pot."},
                {step:"3",icon:"\ud83c\udfc6",title:"Win Cash",desc:"Entry fees fund the prize pool. Regular season champ and World Series pick winner split the money."}
              ].map(function(s){return <div key={s.step} style={{textAlign:"center"}}>
                <div style={{width:48,height:48,borderRadius:"50%",background:LGv,border:"2px solid "+Gv,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",fontSize:22}}>{s.icon}</div>
                <div style={{fontSize:13,fontWeight:800,color:Nv,marginBottom:6}}>{s.title}</div>
                <div style={{fontSize:12,color:GYv,lineHeight:1.6}}>{s.desc}</div>
              </div>})}
            </div>
          </div>

          {/* Sign Up Form */}
          <div style={{background:cB,borderRadius:12,overflow:"hidden",border:"1px solid "+cBd,marginBottom:24}}>
            <div style={{background:"#1B2A4A",padding:"14px 24px"}}><span style={{color:"#fff",fontSize:14,fontWeight:700}}>GET EARLY ACCESS</span></div>
            {signSent?
              <div style={{padding:"40px 24px",textAlign:"center"}}>
                <div style={{fontSize:32,marginBottom:12}}>{"\u2705"}</div>
                <div style={{fontSize:18,fontWeight:800,color:Nv,fontFamily:"'Playfair Display',serif",marginBottom:8}}>You're on the list!</div>
                <div style={{fontSize:13,color:GYv}}>We'll reach out when new leagues open up.</div>
                {signLeagues.length>0&&<div style={{fontSize:12,color:Gv,fontWeight:600,marginTop:8}}>Interested in: {signLeagues.join(", ")}</div>}
              </div>:
              <div style={{padding:"24px"}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:Nv,letterSpacing:1,marginBottom:6}}>YOUR NAME</div>
                    <input value={signName} onChange={function(e){setSignName(e.target.value)}} placeholder="Full name" style={{width:"100%",padding:"12px 14px",border:"1px solid "+iBd,borderRadius:8,fontSize:14,color:Nv,background:iB,boxSizing:"border-box"}}/>
                  </div>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:Nv,letterSpacing:1,marginBottom:6}}>EMAIL</div>
                    <input value={signEmail} onChange={function(e){setSignEmail(e.target.value)}} placeholder="your@email.com" type="email" style={{width:"100%",padding:"12px 14px",border:"1px solid "+iBd,borderRadius:8,fontSize:14,color:Nv,background:iB,boxSizing:"border-box"}}/>
                  </div>
                </div>
                <div style={{marginBottom:20}}>
                  <div style={{fontSize:11,fontWeight:700,color:Nv,letterSpacing:1,marginBottom:8}}>WHICH LEAGUES INTEREST YOU?</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                    {["NFL","NBA","NHL","World Cup"].map(function(lg){
                      var sel=signLeagues.includes(lg);
                      return <button key={lg} onClick={function(){toggleLeague(lg)}} style={{
                        background:sel?"#1B2A4A":cB,color:sel?"#fff":Nv,
                        border:"1px solid "+(sel?"#1B2A4A":cBd),borderRadius:20,padding:"8px 18px",
                        fontSize:12,fontWeight:600
                      }}>{sel?"\u2713 ":""}{lg}</button>
                    })}
                  </div>
                </div>
                <button onClick={submitSignup} disabled={!signName.trim()||!signEmail.trim()} style={{
                  width:"100%",background:signName.trim()&&signEmail.trim()?Gv:MGv,
                  color:signName.trim()&&signEmail.trim()?"#1B2A4A":"#999",
                  border:"none",borderRadius:8,padding:"14px",fontSize:14,fontWeight:800,
                  cursor:signName.trim()&&signEmail.trim()?"pointer":"not-allowed"
                }}>SIGN UP FOR EARLY ACCESS</button>
                <div style={{fontSize:10,color:GYv,textAlign:"center",marginTop:8}}>No spam. League invites and updates only.</div>
              </div>}
          </div>

          {/* What to Expect */}
          <div style={{background:cB,borderRadius:12,overflow:"hidden",border:"1px solid "+cBd,marginBottom:24}}>
            <div style={{background:"#1B2A4A",padding:"14px 24px"}}><span style={{color:"#fff",fontSize:14,fontWeight:700}}>WHAT TO EXPECT</span></div>
            <div style={{padding:"24px"}}>
              {[
                {emoji:"\ud83c\udfc8",title:"NFL Team League",desc:"Draft 8 NFL teams. Most combined regular season wins takes the pot. 17-week season of pure strategy. Launching Fall 2026."},
                {emoji:"\ud83c\udfc0",title:"NBA Team League",desc:"Draft 7-8 NBA teams. 82 games of drama. Total wins decide the champion. Launching Fall 2026."},
                {emoji:"\u26bd",title:"World Cup Team League",desc:"Draft 12 national teams for the 2026 FIFA World Cup. Points-based scoring through the tournament. Summer 2026."},
                {emoji:"\ud83c\udfd2",title:"NHL Team League",desc:"Draft 8 NHL teams. Same wins-based format adapted for hockey. Target: 2027 season."}
              ].map(function(item){return <div key={item.title} style={{display:"flex",gap:16,marginBottom:20,alignItems:"flex-start"}}>
                <div style={{fontSize:28,flexShrink:0}}>{item.emoji}</div>
                <div>
                  <div style={{fontSize:14,fontWeight:700,color:Nv,marginBottom:4}}>{item.title}</div>
                  <div style={{fontSize:12,color:GYv,lineHeight:1.6}}>{item.desc}</div>
                </div>
              </div>})}
            </div>
          </div>

          {/* FAQ */}
          <div style={{background:cB,borderRadius:12,overflow:"hidden",border:"1px solid "+cBd,marginBottom:24}}>
            <div style={{background:"#1B2A4A",padding:"14px 24px"}}><span style={{color:"#fff",fontSize:14,fontWeight:700}}>FREQUENTLY ASKED QUESTIONS</span></div>
            <div style={{padding:"24px"}}>
              {[
                {q:"How much does it cost?",a:"Entry fees vary by league but typically $50-$75 per person. All entry fees go directly into the prize pool — zero rake."},
                {q:"How many people per league?",a:"4 managers per league keeps it competitive and ensures every team on your roster matters. We may expand to 6 or 8 for larger sports."},
                {q:"Do I need to know anything about the sport?",a:"Nope. That's the beauty of Team League — you're drafting entire teams, not individual players. Pick the teams you believe in and let the season play out."},
                {q:"When do leagues start?",a:"NFL and NBA leagues launch Fall 2026. World Cup runs Summer 2026. Sign up above and we'll notify you when registration opens."}
              ].map(function(faq){return <div key={faq.q} style={{marginBottom:20,paddingBottom:20,borderBottom:"1px solid "+cBd}}>
                <div style={{fontSize:13,fontWeight:700,color:Nv,marginBottom:6}}>{faq.q}</div>
                <div style={{fontSize:12,color:GYv,lineHeight:1.7}}>{faq.a}</div>
              </div>})}
            </div>
          </div>

          {/* Social Proof */}
          <div style={{padding:"20px 24px",background:LGv,borderRadius:12,border:"1px solid "+Gv+"40",textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:700,color:Nv}}>Fantasy Team League - Est. 2015</div>
            <div style={{fontSize:12,color:GYv,marginTop:4}}>11 seasons strong · Join the next chapter</div>
          </div>
        </div>}

      </div>

      {/* Celebration overlay */}
      {celeb&&<div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",zIndex:9999,display:"flex",justifyContent:"center",alignItems:"center",background:"rgba(27,42,74,0.85)",animation:"fadeIn 0.3s ease"}} onClick={function(){setCeleb(null)}}><div style={{background:"#fff",borderRadius:16,padding:"32px 48px",textAlign:"center",maxWidth:420,animation:"celebBounce 0.5s ease"}} className="celeb-pad"><img src={LOGOS[celeb.team]||""} alt="" style={{width:100,height:100,objectFit:"contain",marginBottom:16}} onError={function(e){e.target.style.display="none"}}/><div style={{fontSize:12,color:"#6B7280",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>DRAFTED BY {(celeb.mgr||"").toUpperCase()}</div><div style={{fontSize:28,fontWeight:900,color:"#1B2A4A",fontFamily:"'Playfair Display',serif",marginBottom:16}} className="celeb-title">The {celeb.team}!</div><img src={GIFS[celeb.team]||""} alt="" style={{width:"100%",maxWidth:300,borderRadius:10,marginBottom:12}} onError={function(e){e.target.style.display="none"}}/><div style={{fontSize:10,color:"#CCC",marginTop:4}}>Click anywhere to dismiss</div></div></div>}

      <div style={{textAlign:"center",padding:"12px 0 16px",fontSize:10,color:GYv}}>Fantasy MLB Team League 2026 - $225 Prize Pool - Defending Champ: Ben</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
