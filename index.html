              <button onClick={shareDraftResults} style={{background:G,color:N,border:"none",borderRadius:6,padding:"8px 20px",fontSize:11,fontWeight:700,fontFamily:"'Libre Franklin',sans-serif"}}>SHARE DRAFT</button>
            </div>
          </div>:
          <div>
            <div className="draft-mgr-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
              {dmg.map(function(name,i){return <div key={i}><div style={{fontSize:9,fontWeight:700,color:GY,letterSpacing:1,marginBottom:3}}>MGR {i+1}</div><input value={name||""} onChange={function(e){setDMgr(i,e.target.value)}} placeholder={"Manager "+(i+1)} disabled={nlk} style={{width:"100%",padding:"8px 10px",border:cur===i&&dor?"2px solid "+G:"1px solid #DDD",borderRadius:6,fontSize:13,fontWeight:600,color:N,boxSizing:"border-box",background:nlk?"#F3F3F3":(cur===i&&dor?LG:"#fff"),fontFamily:"'Libre Franklin',sans-serif",opacity:nlk?0.8:1}}/></div>})}
            </div>
            {!dor&&<div style={{textAlign:"center",padding:32,background:"#fff",borderRadius:12,border:"1px solid #E5E5E5",marginBottom:20}}>
              {shuffled?<div style={{marginBottom:24}}><div style={{fontSize:11,fontWeight:700,color:GY,letterSpacing:2,marginBottom:16}}>{anim?"RANDOMIZING...":"DRAFT ORDER SET"}</div><div style={{display:"flex",justifyContent:"center",gap:16,flexWrap:"wrap"}}>{shuffled.map(function(mIdx,pos){return <div key={pos} style={{background:anim?N+"10":N,borderRadius:10,padding:"16px 20px",minWidth:100,border:"2px solid "+(anim?G+"50":G)}}><div style={{fontSize:28,fontWeight:900,color:anim?N:G,fontFamily:"'Playfair Display',serif"}}>#{pos+1}</div><div style={{fontSize:13,fontWeight:700,marginTop:4,color:anim?GY:"#fff"}}>{dmg[mIdx]||"Mgr "+(mIdx+1)}</div></div>})}</div></div>:
              <div><div style={{fontSize:22,marginBottom:8}}>{"🎲"}</div><div style={{fontSize:16,fontWeight:700,color:N,marginBottom:4}}>Draft Order Randomizer</div><div style={{fontSize:12,color:GY,marginBottom:20}}>Enter all 4 manager names, then click below.<br/><span style={{fontWeight:700,color:RD}}>One time only - result is final.</span></div></div>}
              <button onClick={doRandom} disabled={anim||!named} style={{background:named&&!anim?G:MG,color:named?N:"#999",border:"none",padding:"14px 40px",fontSize:14,fontWeight:800,borderRadius:8,cursor:named&&!anim?"pointer":"not-allowed",fontFamily:"'Libre Franklin',sans-serif"}}>{anim?"RANDOMIZING...":shuffled?"ORDER LOCKED":"RANDOMIZE DRAFT ORDER"}</button>
              {!named&&!shuffled&&<div style={{fontSize:11,color:RD,marginTop:8}}>Enter all 4 manager names first</div>}
            </div>}
            {dor&&<div style={{background:N,borderRadius:8,padding:"10px 20px",marginBottom:10,display:"flex",justifyContent:"center",alignItems:"center",gap:20,flexWrap:"wrap"}}>
              <span style={{fontSize:11,fontWeight:700,color:G,letterSpacing:2}}>DRAFT ORDER</span>
              {dor.map(function(mIdx,pos){return <div key={pos} style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:16,fontWeight:900,color:G,fontFamily:"'Playfair Display',serif"}}>{pos+1}.</span><span style={{fontSize:13,fontWeight:600,color:"#fff"}}>{dmg[mIdx]}</span></div>})}
              <span style={{fontSize:10,color:"#ffffff50"}}>LOCKED</span>
            </div>}
            {dor&&dr<7&&<div style={{background:LG,borderRadius:6,padding:"8px 16px",marginBottom:10,border:"1px solid "+G+"60",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
              <div><span style={{fontWeight:800,color:N,fontSize:13}}>Round {dr+1}</span><span style={{color:GY,margin:"0 6px"}}>-</span><span style={{fontWeight:600,color:G,fontSize:13}}>{dmg[cur]||"Manager "+(cur+1)} is on the clock</span></div>
              <span style={{fontSize:11,color:GY}}>Pick #{dr*4+dp+1} of 28</span>
            </div>}
            {dor&&<div style={{background:"#fff",borderRadius:10,overflow:"hidden",border:"1px solid #E5E5E5",marginBottom:12,overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",minWidth:480}}>
                <thead><tr style={{background:N}}><th style={{padding:"8px",color:"#fff",fontSize:9,fontWeight:700,width:36}}>RD</th>{dor.map(function(mIdx,pos){return <th key={pos} style={{padding:"8px 12px",color:"#fff",fontSize:11,fontWeight:700}}>{dmg[mIdx]||"Mgr "+(mIdx+1)}<div style={{fontSize:8,color:G,marginTop:1}}>#{pos+1}</div></th>})}</tr></thead>
                <tbody>{[0,1,2,3,4,5,6].map(function(rd){return <tr key={rd} style={{background:rd%2===0?"#FAFAFA":"#fff"}}><td style={{textAlign:"center",fontWeight:800,color:N,fontSize:12,padding:8,background:LN}}>{rd+1}</td>{dor.map(function(mIdx,col){var tp=(dpk[mIdx]||[])[rd]||"";var ic=dr===rd&&cur===mIdx&&!tp;return <td key={col} style={{padding:"8px 10px",textAlign:"center",fontSize:12,fontWeight:tp?600:400,color:tp?N:"#CCC",background:ic?G+"25":"inherit",border:ic?"2px solid "+G:"none"}}>{tp?teamL(tp,14):(ic?"...":"-")}</td>})}</tr>})}</tbody>
              </table>
            </div>}
            {dor&&dr<7&&<div><div style={{fontSize:10,fontWeight:700,color:N,letterSpacing:1.5,marginBottom:8}}>AVAILABLE ({avail.length})</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{avail.map(function(t){return <button key={t} onClick={function(){doPick(t)}} style={{background:"#fff",border:"1px solid #DDD",borderRadius:6,padding:"6px 12px",fontSize:12,fontWeight:500,color:N,fontFamily:"'Libre Franklin',sans-serif"}} onMouseEnter={function(e){e.currentTarget.style.background=LG;e.currentTarget.style.borderColor=G}} onMouseLeave={function(e){e.currentTarget.style.background="#fff";e.currentTarget.style.borderColor="#DDD"}}>{teamL(t,14)}</button>})}</div></div>}
            {dr>=7&&<div style={{textAlign:"center",padding:20,background:LG,borderRadius:10,border:"1px solid "+G}}><div style={{fontSize:24,marginBottom:4}}>{"🎉"}</div><div style={{fontSize:16,fontWeight:800,color:N}}>Draft Complete - Rosters Locked!</div><div style={{fontSize:13,color:GY,marginTop:4}}>All picks are final. Check the Standings and Rosters tabs.</div><div style={{marginTop:8,fontSize:12,color:GY}}>Undrafted: {ALL_TEAMS.filter(function(t){return!taken.includes(t)}).join(", ")||"None"}</div></div>}
          </div>}
            </div>

            <div className="draft-sidebar" style={{width:260,minWidth:260,display:"flex",flexDirection:"column"}}>
              <div style={{background:"#fff",borderRadius:12,overflow:"hidden",border:"1px solid #E5E5E5",display:"flex",flexDirection:"column",flex:1}}>
                <div style={{background:N,padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{color:"#fff",fontSize:11,fontWeight:700}}>TRASH TALK</span>
                  <span style={{color:G,fontSize:9}}>{chatMsgs.length} msgs</span>
                </div>
                <div ref={chatRef} style={{flex:1,overflowY:"auto",padding:"8px 10px",background:"#FAFAFA",minHeight:200}}>
                  {chatMsgs.length===0&&<div style={{textAlign:"center",padding:30,color:GY,fontSize:11}}>No messages yet. Start the trash talk!</div>}
                  {chatMsgs.map(function(m,i){
                    var t=new Date(m.ts);
                    var time=t.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});
                    return <div key={i} style={{marginBottom:10}}>
                      <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                        <span style={{fontSize:12,fontWeight:700,color:N}}>{m.name}</span>
                        <span style={{fontSize:8,color:"#C0C0C0"}}>{time}</span>
                      </div>
                      <div style={{fontSize:12,color:GY,marginTop:1}}>{m.msg}</div>
                    </div>
                  })}
                </div>
                <div style={{padding:"8px 10px",borderTop:"1px solid #E5E5E5"}}>
                  {!chatName.trim()?
                    <div style={{display:"flex",gap:6}}>
                      <input value={chatName} onChange={function(e){setChatName(e.target.value)}} placeholder="Your name" style={{flex:1,padding:"8px 10px",border:"1px solid #DDD",borderRadius:6,fontSize:11,fontFamily:"'Libre Franklin',sans-serif"}}/>
                    </div>:
                    <div>
                      <div style={{fontSize:9,fontWeight:700,color:G,marginBottom:4}}>{chatName}</div>
                      <div style={{display:"flex",gap:6}}>
                        <input value={chatInput} onChange={function(e){setChatInput(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")sendChat()}} placeholder="Talk trash..." style={{flex:1,padding:"8px 10px",border:"1px solid #DDD",borderRadius:6,fontSize:11,fontFamily:"'Libre Franklin',sans-serif"}}/>
                        <button onClick={sendChat} style={{background:G,color:N,border:"none",borderRadius:6,padding:"8px 12px",fontSize:10,fontWeight:700,fontFamily:"'Libre Franklin',sans-serif"}}>SEND</button>
                      </div>
                    </div>}
                </div>
              </div>
            </div>
          </div>
        </div>}

        {tab==="records"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:N,letterSpacing:1.5}}>MLB TEAM RECORDS</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {!recUnlocked&&!editRec?
                <input type="password" placeholder="Admin password" value={recPwd} onChange={function(e){setRecPwd(e.target.value)}} style={{padding:"6px 10px",border:"1px solid #DDD",borderRadius:6,fontSize:11,width:130,fontFamily:"'Libre Franklin',sans-serif"}}/>:null}
              {recUnlocked?
                <button onClick={function(){setEditRec(!editRec)}} style={{background:editRec?GR:N,color:"#fff",border:"none",padding:"8px 20px",fontSize:12,fontWeight:700,borderRadius:6,fontFamily:"'Libre Franklin',sans-serif"}}>{editRec?"Done":"Edit Records"}</button>:null}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(320px, 1fr))",gap:16}}>
            {[
              {name:"AL East",teams:["Yankees","Red Sox","Blue Jays","Orioles","Rays"]},
              {name:"AL Central",teams:["Guardians","Tigers","Twins","Royals","White Sox"]},
              {name:"AL West",teams:["Astros","Mariners","Rangers","Angels","Athletics"]},
              {name:"NL East",teams:["Mets","Braves","Phillies","Nationals","Marlins"]},
              {name:"NL Central",teams:["Cubs","Brewers","Cardinals","Pirates","Reds"]},
              {name:"NL West",teams:["Dodgers","Padres","Diamondbacks","Giants","Rockies"]}
            ].map(function(div){
              return <div key={div.name} style={{background:"#fff",borderRadius:12,overflow:"hidden",border:"1px solid #E5E5E5"}}>
                <div style={{background:N,padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{color:"#fff",fontSize:12,fontWeight:700}}>{div.name}</span>
                  <span style={{color:G,fontSize:10}}>{div.name.startsWith("AL")?"American":"National"}</span>
                </div>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr style={{background:LN}}>
                    <th style={{padding:"8px 12px",fontSize:9,fontWeight:700,color:N,textAlign:"left",letterSpacing:1}}>TEAM</th>
                    <th style={{padding:"8px 8px",fontSize:10,fontWeight:800,color:GR,textAlign:"center"}}>W</th>
                    <th style={{padding:"8px 8px",fontSize:9,fontWeight:600,color:"#C0C0C0",textAlign:"center"}}>L</th>
                    <th style={{padding:"8px 12px",fontSize:9,fontWeight:700,color:N,textAlign:"left"}}>OWNER</th>
                  </tr></thead>
                  <tbody>
                    {[].concat(div.teams).sort(function(a,b){return(rc[b]?rc[b].w:0)-(rc[a]?rc[a].w:0)}).map(function(t,i){
                      var r=rc[t]||{w:0,l:0};var owner="-";dM.forEach(function(m){if((m.teams||[]).includes(t))owner=m.name});
                      return <tr key={t} style={{background:i%2===0?"#FAFAFA":"#fff"}}>
                        <td style={{padding:"8px 12px",fontWeight:600,fontSize:12,color:N}}>{teamL(t,16)}</td>
                        <td style={{textAlign:"center",padding:"8px 6px"}}>{editRec?<input type="number" value={r.w} onChange={function(e){setRc(t,"w",e.target.value)}} style={{width:48,textAlign:"center",border:"2px solid "+GR,borderRadius:4,padding:3,fontSize:13,fontWeight:800,color:GR,fontFamily:"'Libre Franklin'"}}/>:<span style={{fontWeight:800,color:GR,fontSize:14}}>{r.w}</span>}</td>
                        <td style={{textAlign:"center",padding:"8px 6px"}}>{editRec?<input type="number" value={r.l} onChange={function(e){setRc(t,"l",e.target.value)}} style={{width:44,textAlign:"center",border:"1px solid #DDD",borderRadius:4,padding:3,fontSize:10,color:"#C0C0C0",fontFamily:"'Libre Franklin'"}}/>:<span style={{color:"#C0C0C0",fontSize:10}}>{r.l}</span>}</td>
                        <td style={{padding:"8px 12px",fontSize:11,color:owner==="-"?"#CCC":G,fontWeight:600}}>{owner}</td>
                      </tr>
                    })}
                  </tbody>
                </table>
              </div>
            })}
          </div>
        </div>}

        {tab==="rules"&&<div>
          <div style={{background:"#fff",borderRadius:12,overflow:"hidden",border:"1px solid #E5E5E5",marginBottom:24}}>
            <div style={{background:N,padding:"14px 24px"}}><span style={{color:"#fff",fontSize:14,fontWeight:700}}>FANTASY MLB TEAM LEAGUE - OFFICIAL RULES</span></div>
            <div style={{padding:"24px"}}>
              <div style={{fontSize:18,fontWeight:900,color:N,fontFamily:"'Playfair Display',serif",marginBottom:16}}>WINS ARE ALL THAT MATTER</div>
              
              {[
                {title:"THE GAME",items:["Fantasy MLB Team League is a season-long fantasy game where 4 managers draft MLB teams and compete based on total regular season wins.","The manager whose 7 teams accumulate the most combined wins by the end of the MLB regular season is crowned champion."]},
                {title:"THE DRAFT",items:["Snake draft format - 7 rounds, 4 managers.","28 of 30 MLB teams are drafted. 2 teams go undrafted.","Draft order is determined by a one-time randomizer on draft night.","Round 1 follows the randomized order (1-2-3-4). Round 2 reverses (4-3-2-1). This alternates through all 7 rounds.","Once a team is drafted, the pick is final and locked.","Draft Day 2026: March 18, 2026."]},
                {title:"SCORING",items:["Only regular season WINS count. Losses, PCT, and postseason results do not affect standings.","Each manager's 7 team wins are totaled throughout the season.","Standings update in real-time as games are played."]},
                {title:"TIEBREAKER",items:["In the event of a tie in total wins, the manager whose single best team has the most wins is declared the winner."]},
                {title:"ENTRY & PRIZES",items:["Entry fee: $75 per manager ($50 regular season + $25 World Series pick).","Total prize pool: $225.","Regular Season Champion: $150","World Series Pick Winner: $75","Best Single Team: Bragging Rights"]},
                {title:"WORLD SERIES PICK",items:["Each manager selects one team they believe will win the World Series.","This is a separate $25 entry with a $75 payout.","The pick does not need to be a team on your roster."]},
                {title:"2025 CHAMPION",items:["Ben - 600 total wins","Runner-up: Rip - 581 wins","Margin of victory: 19 wins"]}
              ].map(function(section){return <div key={section.title} style={{marginBottom:20}}>
                <div style={{fontSize:12,fontWeight:800,color:G,letterSpacing:2,marginBottom:8,textTransform:"uppercase"}}>{section.title}</div>
                {section.items.map(function(item,i){return <div key={i} style={{fontSize:13,color:GY,lineHeight:1.8,paddingLeft:12,marginBottom:4}}>
                  <span style={{color:N,marginRight:6}}>{">"}</span>{item}
                </div>})}
              </div>})}
            </div>
          </div>

          {/* SUPPORT THE LEAGUE */}
          <div style={{background:N,borderRadius:12,padding:"32px 24px",textAlign:"center"}}>
            <div style={{fontSize:11,color:G,fontWeight:700,letterSpacing:3,marginBottom:8}}>SUPPORT THE LEAGUE</div>
            <div style={{fontSize:20,fontWeight:900,color:"#fff",fontFamily:"'Playfair Display',serif",marginBottom:8}}>Help Keep This Growing</div>
            <div style={{fontSize:12,color:"#ffffff80",marginBottom:20}}>Fantasy MLB Team League is built with love. Support the commissioner and help keep it running. Suggested donation: $1</div>
            <a href="https://venmo.com/michaelrippe?txn=pay&amount=1&note=Fantasy%20MLB%20Team%20League%20Support" target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:8,background:"#008CFF",color:"#fff",textDecoration:"none",padding:"12px 32px",borderRadius:24,fontSize:14,fontWeight:700,fontFamily:"'Libre Franklin',sans-serif"}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M19.5 3.5c.8 1.1 1.2 2.3 1.2 3.8 0 4.7-4 10.8-7.2 15.1H6.8L4 3.8l5.4-.5 1.6 12.8c1.5-2.4 3.3-6.2 3.3-8.8 0-1.3-.2-2.2-.6-3l5.8-.8z"/></svg>
              Support via Venmo - $1
            </a>
            <div style={{fontSize:10,color:"#ffffff40",marginTop:12}}>@michaelrippe</div>
          </div>
        </div>}

      </div>

      {celeb&&<div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",zIndex:9999,display:"flex",justifyContent:"center",alignItems:"center",background:"rgba(27,42,74,0.85)",animation:"fadeIn 0.3s ease"}} onClick={function(){setCeleb(null)}}>
        <div style={{background:"#fff",borderRadius:16,padding:"32px 48px",textAlign:"center",maxWidth:420,animation:"celebBounce 0.5s ease"}}>
          <img src={LOGOS[celeb.team]||""} alt="" style={{width:100,height:100,objectFit:"contain",marginBottom:16}} onError={function(e){e.target.style.display="none"}}/>
          <div style={{fontSize:12,color:GY,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>DRAFTED BY {(celeb.mgr||"").toUpperCase()}</div>
          <div style={{fontSize:28,fontWeight:900,color:N,fontFamily:"'Playfair Display',serif",marginBottom:16}}>The {celeb.team}!</div>
          <img src={GIFS[celeb.team]||""} alt="" style={{width:"100%",maxWidth:300,borderRadius:10,marginBottom:12}} onError={function(e){e.target.style.display="none"}}/>
          <div style={{fontSize:10,color:"#CCC",marginTop:4}}>Click anywhere to dismiss</div>
        </div>
      </div>}

      <div style={{textAlign:"center",padding:"12px 0 16px",fontSize:10,color:GY}}>Fantasy MLB Team League 2026 - $225 Prize Pool - Defending Champ: Ben</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
